<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 | 小凛 Rin</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='rin_bot_web_icon.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink:  #FFB7C5;
            --dark:  #5A4A42;
            --gray:  #888;
            --bg:    #F0EDE8;
            --sbar:  #2C2825;
            --card:  #F7F4F0;
            --bdr:   #D8D3CC;
            --green: #5A9E6F;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Nunito','Noto Sans SC',sans-serif; -webkit-font-smoothing: antialiased; }

        /* ── fake dashboard ── */
        .fake-bg { position: fixed; inset: 0; display: flex; pointer-events: none; user-select: none; }

        .fake-sidebar {
            width: 230px; background: var(--sbar); flex-shrink: 0;
            padding: 26px 16px; display: flex; flex-direction: column;
        }
        .fake-brand {
            display: flex; align-items: center; gap: 9px;
            font-size: 1.1rem; font-weight: 800; color: #F0EDE8;
            margin-bottom: 32px; padding: 0 6px;
        }
        .fake-brand .dot { width: 9px; height: 9px; background: var(--pink); border-radius: 50%; }
        .fake-nav-lbl {
            font-size: .62rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
            color: #6B6058; padding: 0 10px; margin-bottom: 5px; display: block;
        }
        .fake-nav-item {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 10px; border-radius: 9px;
            font-size: .875rem; font-weight: 600; color: #9E938A; margin-bottom: 2px;
        }
        .fake-nav-item.on { background: rgba(232,137,154,.15); color: var(--pink); }
        .fake-nav-ic { width: 14px; height: 14px; background: #3A3330; border-radius: 3px; flex-shrink: 0; }
        .fake-user {
            margin-top: auto; display: flex; align-items: center; gap: 10px;
            padding: 12px; border-radius: 12px; background: rgba(255,255,255,.05);
        }
        .fake-av { width: 36px; height: 36px; border-radius: 50%; background: #3A3330; flex-shrink: 0; }
        .fake-line { height: 9px; background: #3A3330; border-radius: 5px; }

        .fake-main { flex: 1; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        .fake-topbar {
            padding: 20px 32px; border-bottom: 1px solid var(--bdr);
            background: rgba(240,237,232,.9);
            display: flex; align-items: center; justify-content: space-between;
        }
        .fake-tb-btn { width: 150px; height: 36px; background: var(--sbar); border-radius: 50px; opacity: .7; }
        .fake-content { padding: 28px 32px; flex: 1; }
        .fake-sec-head { width: 130px; height: 10px; background: var(--bdr); border-radius: 5px; margin-bottom: 16px; }
        .fake-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }
        .fake-card {
            background: var(--card); border: 1px solid var(--bdr); border-radius: 16px;
            padding: 18px; display: flex; flex-direction: column; gap: 14px;
        }
        .fake-card-top { display: flex; align-items: center; gap: 12px; }
        .fake-card-ic { width: 48px; height: 48px; border-radius: 13px; flex-shrink: 0; }
        .fake-card-ic.c1 { background: linear-gradient(135deg,#FFD4DC,#FFB7C5); }
        .fake-card-ic.c2 { background: linear-gradient(135deg,#B7CFFF,#8FB4FF); }
        .fake-card-ic.c3 { background: linear-gradient(135deg,#B7E4C7,#74C69D); }
        .fake-card-ic.c4 { background: linear-gradient(135deg,#FFE8A3,#FFD166); }
        .fake-card-ic.c5 { background: #E4E0DA; }
        .fake-card-ic.c6 { background: #E4E0DA; }
        .fake-card-btn { height: 34px; background: #E4E0DA; border-radius: 9px; }

        /* ── blur overlay ── */
        .blur-cover {
            position: fixed; inset: 0;
            backdrop-filter: blur(12px) brightness(.82) saturate(.65);
            -webkit-backdrop-filter: blur(12px) brightness(.82) saturate(.65);
            background: rgba(240,237,232,.28);
        }

        /* ── modal ── */
        .modal-stage {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .modal {
            background: rgba(255,252,248,.97);
            border: 1px solid rgba(255,255,255,.85);
            border-radius: 28px;
            padding: 44px 38px 36px;
            max-width: 390px; width: 100%;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255,183,197,.12),
                0 32px 80px rgba(90,74,66,.22),
                0 8px 24px rgba(90,74,66,.1);
            animation: pop-in .5s cubic-bezier(.34,1.3,.64,1) both;
        }
        @keyframes pop-in {
            from { opacity: 0; transform: scale(.86) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* rin image — sticker style */
        .rin-wrap {
            width: 150px;
            margin: 0 auto 22px;
            position: relative;
            animation: rin-float 3.5s ease-in-out infinite;
        }
        @keyframes rin-float {
            0%,100% { transform: translateY(0) rotate(-1deg); }
            50%      { transform: translateY(-8px) rotate(1deg); }
        }
        .rin-glow {
            position: absolute; inset: -16px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,183,197,.45) 0%, transparent 65%);
            animation: glow 2.8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glow { 0%,100%{opacity:.5;transform:scale(1);} 50%{opacity:1;transform:scale(1.1);} }
        .rin-img {
            position: relative; z-index: 1;
            width: 100%; height: auto;
            display: block;
            border-radius: 20px;
            filter: drop-shadow(0 8px 24px rgba(255,183,197,.5));
        }
        .rin-fallback {
            position: relative; z-index: 1;
            width: 150px; height: 150px;
            border-radius: 20px;
            background: linear-gradient(135deg,#FFF0F5,#FFE4ED);
            display: none; align-items: center; justify-content: center;
            font-size: 3rem;
            box-shadow: 0 8px 24px rgba(255,183,197,.3);
        }
        .q-bubble {
            position: absolute; z-index: 2; top: -8px; right: -8px;
            width: 34px; height: 34px; background: var(--pink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 800; color: #fff;
            border: 3px solid #fff; box-shadow: 0 3px 12px rgba(255,183,197,.6);
            animation: qb .9s ease-in-out infinite alternate;
        }
        @keyframes qb { from{transform:translateY(0)rotate(-8deg);} to{transform:translateY(-5px)rotate(6deg);} }

        /* text */
        .eyebrow { font-size: .68rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pink); margin-bottom: 7px; }
        .modal h2 { font-size: 1.35rem; font-weight: 800; line-height: 1.25; color: var(--dark); margin-bottom: 10px; }
        .modal p { font-size: .875rem; color: var(--gray); line-height: 1.7; margin-bottom: 26px; }

        /* buttons */
        .btn-discord {
            display: flex; align-items: center; justify-content: center; gap: 9px;
            width: 100%; padding: 13px; border-radius: 50px;
            background: #5865F2; color: #fff;
            font-size: .93rem; font-weight: 800; font-family: 'Nunito',sans-serif;
            box-shadow: 0 4px 16px rgba(88,101,242,.32);
            transition: all .2s; text-decoration: none; margin-bottom: 9px;
        }
        .btn-discord:hover { background: #4752c4; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(88,101,242,.42); }
        .btn-discord svg { width: 19px; height: 19px; flex-shrink: 0; }
        .btn-back {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 11px; border-radius: 50px;
            border: 1.5px solid var(--bdr); color: var(--gray);
            font-size: .84rem; font-weight: 700; transition: all .18s; text-decoration: none;
        }
        .btn-back:hover { border-color: var(--pink); color: var(--dark); background: #FFF5F7; }

        .chips { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 18px; }
        .chip {
            font-size: .63rem; font-weight: 700; color: #9E938A;
            background: #F0EDE8; border-radius: 50px; padding: 3px 9px;
            display: flex; align-items: center; gap: 4px;
        }
        .chip::before { content:''; width:5px; height:5px; background:var(--pink); border-radius:50%; display:inline-block; }
    </style>
</head>
<body>

<!-- fake dashboard bg -->
<div class="fake-bg" aria-hidden="true">
    <div class="fake-sidebar">
        <div class="fake-brand"><span class="dot"></span>小凛 Rin</div>
        <span class="fake-nav-lbl">导航</span>
        <div class="fake-nav-item on"><span class="fake-nav-ic"></span>我的服务器</div>
        <div class="fake-nav-item"><span class="fake-nav-ic"></span>数据统计</div>
        <div class="fake-nav-item"><span class="fake-nav-ic"></span>全局设置</div>
        <div class="fake-user">
            <div class="fake-av"></div>
            <div style="flex:1">
                <div class="fake-line" style="width:80px; margin-bottom:6px;"></div>
                <div class="fake-line" style="width:50px; opacity:.4;"></div>
            </div>
        </div>
    </div>
    <div class="fake-main">
        <div class="fake-topbar">
            <div>
                <div class="fake-line" style="width:140px; height:16px; margin-bottom:8px;"></div>
                <div class="fake-line" style="width:200px; height:9px; background:#E4E0DA;"></div>
            </div>
            <div class="fake-tb-btn"></div>
        </div>
        <div class="fake-content">
            <div class="fake-sec-head"></div>
            <div class="fake-grid">
                <div class="fake-card"><div class="fake-card-top"><div class="fake-card-ic c1"></div><div><div class="fake-line" style="width:90px;height:12px;margin-bottom:6px;"></div><div class="fake-line" style="width:64px;height:8px;background:#E4E0DA;"></div></div></div><div class="fake-card-btn"></div></div>
                <div class="fake-card"><div class="fake-card-top"><div class="fake-card-ic c2"></div><div><div class="fake-line" style="width:90px;height:12px;margin-bottom:6px;"></div><div class="fake-line" style="width:64px;height:8px;background:#E4E0DA;"></div></div></div><div class="fake-card-btn"></div></div>
                <div class="fake-card"><div class="fake-card-top"><div class="fake-card-ic c3"></div><div><div class="fake-line" style="width:90px;height:12px;margin-bottom:6px;"></div><div class="fake-line" style="width:64px;height:8px;background:#E4E0DA;"></div></div></div><div class="fake-card-btn"></div></div>
                <div class="fake-card"><div class="fake-card-top"><div class="fake-card-ic c4"></div><div><div class="fake-line" style="width:90px;height:12px;margin-bottom:6px;"></div><div class="fake-line" style="width:64px;height:8px;background:#E4E0DA;"></div></div></div><div class="fake-card-btn"></div></div>
                <div class="fake-card"><div class="fake-card-top"><div class="fake-card-ic c5"></div><div><div class="fake-line" style="width:90px;height:12px;margin-bottom:6px;"></div><div class="fake-line" style="width:64px;height:8px;background:#E4E0DA;"></div></div></div><div class="fake-card-btn"></div></div>
                <div class="fake-card"><div class="fake-card-top"><div class="fake-card-ic c6"></div><div><div class="fake-line" style="width:90px;height:12px;margin-bottom:6px;"></div><div class="fake-line" style="width:64px;height:8px;background:#E4E0DA;"></div></div></div><div class="fake-card-btn"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- blur layer -->
<div class="blur-cover"></div>

<!-- modal -->
<div class="modal-stage">
    <div class="modal">

        <div class="rin-wrap">
            <div class="rin-glow"></div>
            <img class="rin-img"
                src="{{ url_for('static', filename='rin_question_1.png') }}"
                alt="小凛"
                onerror="this.style.display='none';document.querySelector('.rin-fallback').style.display='flex';">
            <div class="rin-fallback">(｡•́︿•̀｡)</div>
            <div class="q-bubble">?</div>
        </div>

        <p class="eyebrow">欸？！谁来了</p>
        <h2>小凛还不认识你哦！</h2>
        <p>需要先用 Discord 账号登录，<br>小凛才能认出你是服务器管理员。<br>嘿嘿，很快的~ (´• ω •`)ﾉ</p>

        <a href="/login" class="btn-discord">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.057a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            使用 Discord 登录
        </a>

        <a href="/" class="btn-back">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            回到小凛主页
        </a>

        <div class="chips">
            <span class="chip">仅读取服务器列表</span>
            <span class="chip">不存储个人数据</span>
            <span class="chip">随时可撤销授权</span>
        </div>

    </div>
</div>

</body>
</html>
