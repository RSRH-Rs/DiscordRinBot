<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出错了 | 小凛 Rin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Nunito',sans-serif; background:#FAFAFA; color:#5A4A42; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center; }
        .box { max-width:440px; padding:0 24px; }
        .emoji { font-size:2.2rem; color:#FFB7C5; font-weight:800; margin-bottom:20px; }
        h1 { font-size:1.5rem; font-weight:800; margin-bottom:10px; }
        p  { font-size:0.9rem; color:#888; line-height:1.7; margin-bottom:6px; }
        .err { background:#fff; border:1px solid #EAEAEA; border-radius:10px; padding:12px 16px; font-family:monospace; font-size:0.8rem; color:#c0566a; text-align:left; margin:20px 0; word-break:break-all; }
        a { display:inline-block; margin-top:8px; padding:11px 32px; background:#5A4A42; color:#fff; border-radius:50px; font-weight:800; font-size:0.9rem; transition:.2s; }
        a:hover { background:#FFB7C5; color:#5A4A42; }
    </style>
</head>
<body>
    <div class="box">
        <div class="emoji">欸？！(°ロ°)</div>
        <h1>登录遇到了小麻烦…</h1>
        <p>通常是 Session 过期或浏览器 Cookie 问题，重新登录就好了！</p>
        <div class="err">{{ error }}</div>
        <a href="/login">重新登录</a>
    </div>
</body>
</html>
